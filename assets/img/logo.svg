<?xml version="1.0" encoding="UTF-8"?>
<svg id="a3-elite-institutional-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <rect id="background-rect" width="512" height="512" fill="#010307" rx="90" ry="90"/>
    
    <pattern id="chart-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnMap">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(14, 165, 233, 0.08)" stroke-width="1"/>
    </pattern>

    <linearGradient id="bull-vibrant" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="bear-vibrant" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.2" />
    </linearGradient>

    <filter id="vector-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <use href="#background-rect" />
  <rect width="512" height="512" fill="url(#chart-grid)" rx="90" ry="90"/>

  <g id="trading-action" opacity="0.5">
    <rect x="60" y="340" width="15" height="30" fill="url(#bull-vibrant)" />
    <line x1="67.5" y1="330" x2="67.5" y2="380" stroke="#10b981" stroke-width="1" />
    
    <rect x="85" y="350" width="15" height="40" fill="url(#bear-vibrant)" />
    <line x1="92.5" y1="340" x2="92.5" y2="400" stroke="#ef4444" stroke-width="1" />

    <rect x="130" y="220" width="20" height="120" fill="url(#bull-vibrant)" />
    <line x1="140" y1="200" x2="140" y2="350" stroke="#10b981" stroke-width="2" />
    
    <rect x="160" y="160" width="20" height="80" fill="url(#bull-vibrant)" />
    <line x1="170" y1="140" x2="170" y2="250" stroke="#10b981" stroke-width="2" />
  </g>

  <g id="institutional-tools" filter="url(#vector-glow)">
    <path d="M140,350 L280,140" stroke="#0ea5e9" stroke-width="4" stroke-dasharray="8,4" opacity="0.8" />
    
    <line x1="280" y1="140" x2="460" y2="140" stroke="#00F5A0" stroke-width="3" />
    <text x="400" y="130" font-family="Space Mono, monospace" font-size="10" fill="#00F5A0" font-weight="bold">TARGET: BSL</text>
    
    <circle cx="140" cy="350" r="6" fill="#0ea5e9" />
    <text x="100" y="370" font-family="Space Mono, monospace" font-size="10" fill="#0ea5e9">ENTRY: FVG</text>
  </g>
  
  <text x="256" y="310" font-family="Rajdhani, sans-serif" font-size="240" font-weight="900" text-anchor="middle" letter-spacing="6" filter="url(#vector-glow)">
    <tspan fill="#38bdf8">A</tspan><tspan fill="#00F5A0">3</tspan>
  </text>
  
  <rect x="130" y="455" width="252" height="24" rx="12" fill="rgba(14, 165, 233, 0.1)" stroke="rgba(0, 245, 160, 0.3)" />
  <text x="256" y="471" font-family="Space Mono, monospace" font-size="10" fill="#00F5A0" text-anchor="middle" letter-spacing="4">NEURAL CORE: ONLINE</text>

</svg>
